stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python3 -V
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt

# ── Lint Stage ────────────────────────────────────────────────────────────────
flake8-lint:
  stage: lint
  image: python:3.10-slim
  script:
    - pip install flake8
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

ruff-lint:
  stage: lint
  image: python:3.10-slim
  script:
    - ruff check .

pylint-lint:
  stage: lint
  image: python:3.10-slim
  script:
    - pip install pylint
    - pylint $(find . -name "*.py" -not -path "*/.*" -not -path "./venv/*") --disable=all --enable=E,F

semgrep-scan:
  stage: lint
  image:
    name: returntocorp/semgrep:latest
    entrypoint: [""]
  before_script: []
  script:
    - semgrep scan --config=auto --error --skip-unknown-extensions

gitleaks-scan:
  stage: lint
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --verbose --source=$CI_PROJECT_DIR --no-git=true

# ── Format Stage ──────────────────────────────────────────────────────────────
ruff-format:
  stage: format
  image: python:3.10-slim
  script:
    - ruff format --check .

pyupgrade-check:
  stage: format
  image: python:3.10-slim
  script:
    - pip install pyupgrade
    - pyupgrade --py310-plus $(find . -name "*.py" -not -path "*/.*" -not -path "./venv/*")


# ── Type Check Stage ──────────────────────────────────────────────────────────
mypy-typecheck:
  stage: type_check
  image: python:3.10-slim
  script:
    - mypy .

# ── Test Stage ────────────────────────────────────────────────────────────────
pytest-testing:
  stage: test
  image: python:3.10-slim
  script:
    - pytest

dependency-audit:
  stage: test
  image: python:3.10-slim
  script:
    - pip install pip-audit
    - pip-audit -r requirements.txt

# ── Coverage Stage ────────────────────────────────────────────────────────────
pytest-coverage:
  stage: coverage
  image: python:3.10-slim
  script:
    - pytest --cov=services --cov=rag --cov-report=term-missing --cov-fail-under=20

# ── Build Stage ───────────────────────────────────────────────────────────────
docker-build-check:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script: []  # Override global before_script to avoid python install
  script:
    - docker build -t studentstudybuddy:latest .
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
